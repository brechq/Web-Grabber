<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SourceCode Grabber | Extract Any Website HTML</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: moveBackground 20s linear infinite;
            pointer-events: none;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 40px); }
        }

        .container {
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: clamp(10px, 3vw, 20px);
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: clamp(20px, 5vw, 40px);
            animation: fadeInDown 0.8s ease;
        }

        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: clamp(6px, 2vw, 8px) clamp(15px, 4vw, 20px);
            border-radius: 50px;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            color: #a78bfa;
            margin-bottom: clamp(15px, 4vw, 20px);
            border: 1px solid rgba(167, 139, 250, 0.3);
        }

        .header h1 {
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #c084fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: clamp(10px, 3vw, 15px);
        }

        .header p {
            color: rgba(255,255,255,0.7);
            font-size: clamp(0.85rem, 3vw, 1.1rem);
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: clamp(16px, 4vw, 24px);
            padding: clamp(20px, 5vw, 30px);
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            gap: clamp(10px, 3vw, 15px);
            flex-wrap: wrap;
            align-items: center;
        }

        .url-wrapper {
            flex: 1;
            position: relative;
            min-width: 200px;
        }

        .url-icon {
            position: absolute;
            left: clamp(12px, 4vw, 18px);
            top: 50%;
            transform: translateY(-50%);
            color: #a78bfa;
            font-size: 1rem;
        }

        .url-input {
            width: 100%;
            padding: clamp(12px, 4vw, 16px) clamp(12px, 4vw, 20px) clamp(12px, 4vw, 16px) clamp(40px, 10vw, 50px);
            font-size: clamp(0.85rem, 3vw, 1rem);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: clamp(12px, 3vw, 16px);
            color: white;
            font-family: 'Inter', monospace;
            transition: all 0.3s;
        }

        .url-input:focus {
            outline: none;
            border-color: #a78bfa;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.3);
        }

        /* ============ BUTTON EXTRACT ============ */
        .btn-extract {
            background: linear-gradient(135deg, #5b21b6, #7c3aed);
            border: none;
            padding: clamp(12px, 4vw, 16px) clamp(20px, 6vw, 32px);
            border-radius: clamp(12px, 3vw, 16px);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(0.85rem, 3vw, 1rem);
            position: relative;
            overflow: hidden;
        }

        .btn-extract::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-extract:hover::before {
            left: 100%;
        }

        .btn-extract:hover {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
        }

        .btn-extract:active {
            transform: translateY(0);
        }

        /* ============ PROXY BUTTONS ============ */
        .proxy-selector {
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }

        .proxy-label {
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        .proxy-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .proxy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .proxy-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .proxy-btn:hover::before {
            left: 100%;
        }

        .proxy-btn:hover {
            background: linear-gradient(135deg, #7c3aed, #a78bfa);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(124, 58, 237, 0.3);
        }

        .proxy-btn.active {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border-color: #a78bfa;
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
        }

        /* ============ ACTION BUTTONS (Copy, Download, Clear) ============ */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }

        .btn-download:hover {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-clear:hover {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
        }

        /* ============ SUPPORT BUTTON ============ */
        .support-btn {
            background: linear-gradient(135deg, #d97706, #f59e0b);
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
        }

        .support-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .support-btn:hover::before {
            left: 100%;
        }

        .support-btn:hover {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }

        /* ============ LOADING BAR ============ */
        .loading {
            display: none;
            margin-top: 20px;
        }

        .loading-bar-container {
            background: rgba(255,255,255,0.08);
            border-radius: 50px;
            height: 8px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }

        .loading-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8b5cf6, #a78bfa, #c084fc, #e9d5ff, #c084fc, #a78bfa, #8b5cf6);
            background-size: 200% 100%;
            border-radius: 50px;
            transition: width 0.3s ease-out;
            animation: gradientShift 1.5s ease infinite, glowPulse 0.8s ease-in-out infinite alternate;
            position: relative;
            box-shadow: 0 0 10px #a78bfa, 0 0 20px #8b5cf6;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px #a78bfa, 0 0 10px #8b5cf6; }
            100% { box-shadow: 0 0 15px #c084fc, 0 0 25px #a78bfa; }
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .loading-text {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }

        .loading-percentage {
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        .error {
            display: none;
            background: rgba(239, 68, 68, 0.15);
            border-left: 3px solid #ef4444;
            padding: 15px;
            border-radius: 12px;
            color: #fca5a5;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h3 {
            color: white;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        pre {
            background: #0f0f13;
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
            max-height: 500px;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
            color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.1);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .stats {
            margin-top: 15px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer {
            text-align: center;
            padding: 30px 20px;
            margin-top: 40px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .made-by {
            color: rgba(255,255,255,0.6);
            margin-bottom: 15px;
        }

        .made-by span {
            color: #a78bfa;
            font-weight: 600;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-size: 0.9rem;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .action-btn span { display: none; }
            .action-btn { padding: 10px 12px; }
        }

        @media (max-width: 480px) {
            .stats { flex-direction: column; gap: 8px; }
            .result-header { flex-direction: column; align-items: flex-start; }
            .btn-group { width: 100%; }
            .action-btn { flex: 1; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="badge">
            <i class="fas fa-code"></i> Web Scraper Tool
        </div>
        <h1>
            <i class="fas fa-file-code"></i> SourceCode Grabber
        </h1>
        <p>Extract & download HTML source code from any website instantly</p>
    </div>

    <div class="card">
        <div class="input-group">
            <div class="url-wrapper">
                <i class="fas fa-link url-icon"></i>
                <input type="url" id="urlInput" class="url-input" placeholder="https://example.com" value="https://example.com">
            </div>
            <button class="btn-extract" id="fetchBtn">
                <i class="fas fa-magic"></i> Extract Source
            </button>
        </div>

        <div class="proxy-selector">
            <span class="proxy-label"><i class="fas fa-exchange-alt"></i> Proxy Server:</span>
            <div class="proxy-buttons">
                <button class="proxy-btn active" data-proxy="0">Auto</button>
                <button class="proxy-btn" data-proxy="1">Proxy 1</button>
                <button class="proxy-btn" data-proxy="2">Proxy 2</button>
                <button class="proxy-btn" data-proxy="3">Proxy 3</button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="loading-bar-container">
                <div class="loading-bar" id="loadingBar"></div>
            </div>
            <div class="loading-text">
                <span id="loadingMessage">Starting...</span>
                <span class="loading-percentage" id="loadingPercentage">0%</span>
            </div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <div class="card" id="resultCard" style="display: none;">
        <div class="result-header">
            <h3><i class="fas fa-code-branch"></i> Source Code Result</h3>
            <div class="btn-group">
                <button class="action-btn btn-copy" id="copyBtn"><i class="fas fa-copy"></i> <span>Copy</span></button>
                <button class="action-btn btn-download" id="downloadBtn"><i class="fas fa-download"></i> <span>Download</span></button>
                <button class="action-btn btn-clear" id="clearBtn"><i class="fas fa-trash-alt"></i> <span>Clear</span></button>
            </div>
        </div>
        <pre id="sourceCode"></pre>
        <div class="stats" id="stats"></div>
    </div>

    <div class="footer">
        <div class="made-by">
            Made with <i class="fas fa-heart" style="color: #ef4444;"></i> by <span>Brechq</span>
        </div>
        <button class="support-btn" id="supportBtn">
            <i class="fas fa-hand-holding-heart"></i> Support This Project
        </button>
    </div>
</div>

<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Success!</span>
</div>

<script>
    // ============ VARIABLES ============
    let currentSourceCode = '';
    let selectedProxy = 0;
    let loadingInterval = null;
    let currentProgress = 0;
    let isFetching = false;

    // Proxy list
    const proxies = [
        { name: 'Auto', url: (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` },
        { name: 'Proxy 1', url: (url) => `https://cors-anywhere.herokuapp.com/${url}` },
        { name: 'Proxy 2', url: (url) => `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(url)}` },
        { name: 'Proxy 3', url: (url) => `https://corsproxy.io/?${encodeURIComponent(url)}` }
    ];

    // ============ UTILITY FUNCTIONS ============
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        toastMessage.textContent = message;
        toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    function showError(message) {
        const errorDiv = document.getElementById('error');
        errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 8000);
    }

    function updateProgress(percentage, message) {
        currentProgress = percentage;
        const loadingBar = document.getElementById('loadingBar');
        const percentageEl = document.getElementById('loadingPercentage');
        const messageEl = document.getElementById('loadingMessage');
        
        loadingBar.style.width = percentage + '%';
        percentageEl.textContent = Math.floor(percentage) + '%';
        messageEl.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${message}`;
    }

    function startLoading() {
        document.getElementById('loading').style.display = 'block';
        currentProgress = 0;
        updateProgress(0, 'Starting...');
        
        if (loadingInterval) clearInterval(loadingInterval);
        loadingInterval = setInterval(() => {
            if (currentProgress < 90 && isFetching) {
                const increment = (90 - currentProgress) * 0.1 + 0.5;
                updateProgress(Math.min(currentProgress + increment, 90), document.getElementById('loadingMessage').textContent.replace('<i class="fas fa-spinner fa-pulse"></i> ', ''));
            }
        }, 200);
    }

    function stopLoading(success = true) {
        isFetching = false;
        if (loadingInterval) {
            clearInterval(loadingInterval);
            loadingInterval = null;
        }
        
        if (success) {
            updateProgress(100, 'Complete!');
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 500);
        } else {
            document.getElementById('loading').style.display = 'none';
        }
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function formatHTML(html) {
        try {
            let formatted = html
                .replace(/>\s+</g, '><')
                .replace(/</g, '\n<')
                .replace(/>/g, '>\n');
            formatted = formatted.replace(/\n\s*\n/g, '\n').trim();
            return formatted;
        } catch (e) {
            return html;
        }
    }

    // ============ MAIN FUNCTION ============
    async function fetchSourceCode() {
        if (isFetching) return;
        
        const urlInput = document.getElementById('urlInput');
        let url = urlInput.value.trim();

        if (!url) {
            showError('Please enter a valid URL!');
            return;
        }

        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
            urlInput.value = url;
        }

        document.getElementById('error').style.display = 'none';
        document.getElementById('resultCard').style.display = 'none';
        isFetching = true;
        startLoading();

        try {
            updateProgress(10, 'Validating URL...');
            await new Promise(r => setTimeout(r, 300));
            
            updateProgress(20, 'URL validated');
            await new Promise(r => setTimeout(r, 200));
            
            let html = null;
            let usedProxy = selectedProxy;
            
            updateProgress(30, 'Connecting to proxy...');
            await new Promise(r => setTimeout(r, 300));
            
            if (selectedProxy === 0) {
                for (let i = 1; i < proxies.length; i++) {
                    try {
                        updateProgress(40 + (i * 10), `Trying ${proxies[i].name}...`);
                        const proxyUrl = proxies[i].url(url);
                        const response = await fetch(proxyUrl);
                        if (!response.ok) throw new Error(`HTTP ${response.status}`);
                        html = await response.text();
                        usedProxy = i;
                        updateProgress(70, `Connected via ${proxies[i].name}`);
                        break;
                    } catch (err) {
                        console.log(`${proxies[i].name} failed:`, err);
                        continue;
                    }
                }
                
                if (!html) {
                    throw new Error('All proxies failed. Try manual proxy selection.');
                }
            } else {
                updateProgress(40, `Connecting to ${proxies[selectedProxy].name}...`);
                const proxyUrl = proxies[selectedProxy].url(url);
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                html = await response.text();
                usedProxy = selectedProxy;
                updateProgress(70, 'Data received, processing...');
            }
            
            updateProgress(80, 'Processing source code...');
            await new Promise(r => setTimeout(r, 300));
            
            if (!html || html.length === 0) {
                throw new Error('Source code is empty');
            }

            currentSourceCode = html;
            const formattedHtml = formatHTML(html);
            document.getElementById('sourceCode').textContent = formattedHtml;
            
            const stats = document.getElementById('stats');
            stats.innerHTML = `
                <span><i class="fas fa-database"></i> Size: ${formatBytes(html.length)}</span>
                <span><i class="fas fa-code"></i> Lines: ${html.split('\n').length}</span>
                <span><i class="fas fa-text-width"></i> Characters: ${html.length.toLocaleString()}</span>
                <span><i class="fas fa-link"></i> URL: ${url}</span>
                <span><i class="fas fa-server"></i> Proxy: ${proxies[usedProxy].name}</span>
            `;
            
            updateProgress(95, 'Finalizing...');
            await new Promise(r => setTimeout(r, 200));
            
            document.getElementById('resultCard').style.display = 'block';
            stopLoading(true);
            showToast(`Success! Fetched using ${proxies[usedProxy].name}`);
            
        } catch (error) {
            console.error('Error:', error);
            stopLoading(false);
            showError(`
                Failed to fetch: ${error.message}
                <br><br>
                <strong>💡 Tips:</strong>
                <ul style="margin-top: 8px; margin-left: 20px;">
                    <li>Try a different proxy server above</li>
                    <li>Test with: https://example.com</li>
                    <li>Some websites block all proxies</li>
                </ul>
            `);
        }
    }

    // ============ ACTION FUNCTIONS ============
    function copyToClipboard() {
        if (!currentSourceCode) {
            showError('Nothing to copy!');
            return;
        }
        navigator.clipboard.writeText(currentSourceCode).then(() => {
            showToast('Copied to clipboard!');
        }).catch(() => {
            showError('Failed to copy');
        });
    }

    function downloadSourceCode() {
        if (!currentSourceCode) {
            showError('Nothing to download!');
            return;
        }
        const blob = new Blob([currentSourceCode], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const filename = `source_${Date.now()}.html`;
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast(`Downloaded as ${filename}`);
    }

    function clearResult() {
        currentSourceCode = '';
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('urlInput').value = '';
        showToast('Cleared!');
    }

    function openSupport() {
        window.open('https://sociabuzz.com/explorermc/tribe', '_blank');
        showToast('Thank you for your support! 🙏');
    }

    // ============ EVENT LISTENERS ============
    document.querySelectorAll('.proxy-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.proxy-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            selectedProxy = parseInt(this.dataset.proxy);
            showToast(`Switched to ${proxies[selectedProxy].name}`);
        });
    });

    document.getElementById('fetchBtn').addEventListener('click', fetchSourceCode);
    document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
    document.getElementById('downloadBtn').addEventListener('click', downloadSourceCode);
    document.getElementById('clearBtn').addEventListener('click', clearResult);
    document.getElementById('supportBtn').addEventListener('click', openSupport);

    document.getElementById('urlInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') fetchSourceCode();
    });
</script>
</body>
</html>
